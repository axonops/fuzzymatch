# CLA Assistant — gates external contributions behind a signed Contributor
# Licence Agreement. Signatures are stored IN this repository at
# `signatures/version1/cla.json` (mirrors mask's pattern per D-08).
#
# How signing works:
#   - A new contributor opens a PR. The action posts a comment with the
#     CLA text and a signing prompt.
#   - The contributor replies with the exact phrase
#     "I have read the CLA Document and I hereby sign the CLA".
#   - The action commits their GitHub identity into signatures/version1/cla.json
#     using CLA_PAT (a repo secret).
#
# Allowlist: bots (Dependabot, Renovate, github-actions) are exempted —
# they cannot meaningfully sign a CLA.
#
# Setup note: CLA_PAT must be added as a repository secret with write
# access. Until it is, signature commits will fail. CLA.md (the document
# itself) lands in plan 01-08; the action's `path-to-document` URL 404s
# until that plan ships, which is acceptable because no external PRs are
# expected before then.
#
# Spec: STACK.md (contributor-assistant/github-action v2.6.1);
# 01-CONTEXT.md D-08 — CLA Assistant, NOT DCO; mirror mask.
name: CLA Assistant

on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - opened
      - closed
      - synchronize

# Workflow-level permissions reflect what the action needs in aggregate.
# pull_request_target runs with target-branch (write) permissions, which
# is why the `if:` guard on the job is critical — it gates execution to
# the legitimate CLA flows only.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    name: cla-check
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    if: (github.event_name == 'issue_comment' && contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA')) || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/axonops/fuzzymatch/blob/main/CLA.md"
          branch: main
          allowlist: "dependabot[bot],renovate[bot],github-actions[bot]"
          lock-pullrequest-aftermerge: false
