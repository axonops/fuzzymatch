# License Headers — verifies every tracked .go file carries the canonical
# AxonOps Apache-2.0 header. Wraps scripts/verify-license-headers.sh from
# plan 01-01.
#
# Q13: every third-party action `uses:` reference is pinned to a 40-char
# commit SHA with a `# vN.x.y` comment for human readability.
name: License Headers

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: verify-license-headers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run verify-license-headers.sh
        run: bash scripts/verify-license-headers.sh
