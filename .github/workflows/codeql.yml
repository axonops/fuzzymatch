# CodeQL — semantic security analysis for Go. Runs on every PR, every push
# to main, and weekly (Tuesdays 06:00 UTC). Uses the v4 action with the
# Go 1.26-capable bundle (≥ 2.25.x).
#
# Q13: every third-party action `uses:` reference is pinned to a 40-char
# commit SHA with a `# vN.x.y` comment for human readability.
name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 2'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - go
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7c1e4cf0b20d7c1872b26569c00ba908797a59bf  # v4 (codeql-bundle-v2.25.4)
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild

      - name: Autobuild
        uses: github/codeql-action/autobuild@7c1e4cf0b20d7c1872b26569c00ba908797a59bf  # v4 (codeql-bundle-v2.25.4)

      - name: Analyze
        uses: github/codeql-action/analyze@7c1e4cf0b20d7c1872b26569c00ba908797a59bf  # v4 (codeql-bundle-v2.25.4)
        with:
          category: "/language:${{ matrix.language }}"
