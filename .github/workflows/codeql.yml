# CodeQL — semantic security analysis for Go. Runs on every PR, every push
# to main, and weekly (Tuesdays 06:00 UTC). Uses the v4 action with the
# Go 1.26-capable bundle (≥ 2.25.x).
name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 2'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - go
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
