# Release workflow — TAG PUSH ONLY.
#
# This workflow exists to make local releases structurally impossible.
# It triggers exclusively on `refs/tags/v*` (push.tags). No other trigger
# is permitted — neither manual dispatch, nor repository dispatch, nor
# schedule, nor pull-request. CLAUDE.md "Releases — CI Only" forbids any
# local tagging path; the devops agent flags any drift here as BLOCKING.
#
# Pipeline:
#   1. goreleaser/goreleaser-action@v7  →  source tarball + checksums.txt + Syft SBOM + GitHub Release
#   2. cosign sign-blob --bundle        →  keyless OIDC signing of checksums.txt
#   3. gh release upload                →  attach the bundle to the GitHub Release
#   4. actions/attest-build-provenance  →  OIDC build-provenance attestation over dist/*.tar.gz
#   5. cosign verify-blob               →  proves the signature verifies before workflow exit
#
# Q13 gate: the `release` job lists `needs: [ci]` — but `ci.yml` is on the
# `pull_request` + `push` triggers, NOT on `push.tags`, so `needs:` cannot
# resolve a cross-workflow dependency directly. The structural gate is the
# pre-flight job below: `verify-ci-green` queries the GitHub Checks API for
# the latest `CI / make check` run on the tagged commit and fails if it is
# not `success`. Branch-protection rules on `main` provide a second belt.
#
# Action SHA pinning: every `uses:` reference is pinned to a 40-char commit
# SHA with a `# vN.x.y` comment for human readability (Q13, T-08.5-30
# mitigation). Tag movement upstream cannot affect the pinned SHA.
#
# Spec: docs/requirements.md §17.1 (release.yml); STACK.md Release Stack.
name: Release

on:
  push:
    tags:
      - "v*"

# Workflow-level: least-privilege baseline. Job-level escalation only.
permissions:
  contents: read

jobs:
  # Pre-flight gate (Q13 — release.yml needs:[ci]) — verifies the tagged
  # commit has a green `CI / make check` run on GitHub's Checks API.
  # Because `ci.yml` is on pull_request + push-main (not push-tag), an
  # in-workflow `needs: [ci]` cannot resolve. Instead we use the gh API
  # to assert the tagged SHA carries a successful CI check.
  ci:
    name: verify CI green on tagged commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Assert CI/make check passed on this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha="${GITHUB_SHA}"
          echo "Asserting CI passed on commit ${sha}"
          # Wait up to 10 minutes for the CI run (in case the tag push
          # outpaced the push-to-main CI run by seconds).
          for i in $(seq 1 60); do
            statuses=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/check-runs" --jq '.check_runs[] | select(.name | startswith("make check")) | .conclusion' || true)
            if [ -z "${statuses}" ]; then
              echo "Attempt ${i}/60: no CI runs yet on ${sha}; sleeping 10s"
              sleep 10
              continue
            fi
            if echo "${statuses}" | grep -qv '^success$'; then
              echo "FAIL: CI runs on ${sha} contain non-success conclusions:"
              echo "${statuses}"
              exit 1
            fi
            echo "OK: all CI runs on ${sha} are success"
            exit 0
          done
          echo "FAIL: no CI check runs found on ${sha} within 10 minutes"
          exit 1

  release:
    name: goreleaser + cosign + attest
    needs: [ci]
    runs-on: ubuntu-latest
    # Per-job least-privilege escalation. Each scope is justified:
    #   contents: write       — create the GitHub Release and upload assets
    #   id-token: write       — OIDC for cosign keyless and attest-build-provenance
    #   attestations: write   — actions/attest-build-provenance@v2 writes attestations
    #   packages: read        — fetch container images if cosign installer needs them
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: read
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9  # v3.x
        with:
          cosign-release: "v3.0.1"

      - name: Install Syft (for GoReleaser sboms hook)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      - name: GoReleaser
        if: startsWith(github.ref, 'refs/tags/v')
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8  # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cosign keyless-sign checksums.txt
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cosign sign-blob --yes \
            --bundle dist/checksums.txt.bundle \
            --oidc-issuer https://token.actions.githubusercontent.com \
            dist/checksums.txt

      - name: Upload cosign bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/checksums.txt.bundle --clobber

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2.x
        with:
          subject-path: "dist/*.tar.gz"

      - name: Verify cosign bundle (post-release sanity check)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cosign verify-blob \
            --bundle dist/checksums.txt.bundle \
            --certificate-identity-regexp 'https://github.com/axonops/fuzzymatch/.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dist/checksums.txt
