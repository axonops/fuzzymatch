# Commit Lint — enforces Conventional Commits on every PR title and
# every commit in the PR. Rules live in .commitlintrc.yml at the repo
# root.
#
# Q13: every third-party action `uses:` reference is pinned to a 40-char
# commit SHA with a `# vN.x.y` comment for human readability.
#
# Spec: CLAUDE.md "Branching & Commits"; STACK.md (wagoid/commitlint-github-action v6).
name: Commit Lint

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: commitlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@f133a0d95090ef2609192b4a21f54e20af819ea9  # v6.x
        with:
          configFile: .commitlintrc.yml
          helpURL: https://www.conventionalcommits.org/
          failOnWarnings: false
