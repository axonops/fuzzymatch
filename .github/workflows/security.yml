# Security — runs govulncheck and gosec on every PR, every push to main,
# and weekly (Mondays 06:00 UTC). gosec uploads SARIF to the GitHub
# Security tab; govulncheck fails CI on HIGH/CRITICAL findings.
name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run gosec
        uses: securego/gosec@v2.25.0
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif
