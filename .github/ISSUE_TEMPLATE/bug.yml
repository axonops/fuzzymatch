name: Bug report
description: A reproducible defect in fuzzymatch
title: "bug: "
labels:
  - bug
  - needs-triage
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the defect.
      placeholder: e.g. Levenshtein returns 1.0 for empty/empty inputs but the requirements doc specifies 0.0.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Numbered steps to reproduce, or a minimal Go program.
      render: text
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`.
      placeholder: go version go1.26.3 darwin/arm64
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: OS / architecture
      options:
        - linux/amd64
        - linux/arm64
        - darwin/amd64
        - darwin/arm64
        - windows/amd64
        - other
    validations:
      required: true
  - type: input
    id: fuzzymatch-version
    attributes:
      label: fuzzymatch version or commit SHA
      placeholder: v0.1.0 or 94e4df4
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps us diagnose (stack trace, profile, related issues).
    validations:
      required: false
